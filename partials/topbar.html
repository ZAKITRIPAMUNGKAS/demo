<!-- Top Navigation Bar -->
<header class="bg-white border-b border-gray-200 sticky top-0 z-20">
  <div class="flex items-center justify-between px-6 py-4">
    <!-- Mobile Menu Button & Page Title -->
    <div class="flex items-center gap-4">
      <button onclick="toggleSidebar()" class="lg:hidden text-gray-600 hover:text-gray-900">
        <i data-lucide="menu" class="w-6 h-6"></i>
      </button>
      <div>
        <h2 id="pageTitle" class="text-xl font-bold text-gray-900">Dashboard</h2>
        <p id="pageSubtitle" class="text-sm text-gray-600">Ringkasan sistem dan aktivitas terbaru</p>
      </div>
    </div>

    <!-- Right Side Actions -->
    <div class="flex items-center gap-4">
      <!-- Search -->
      <div class="hidden md:block relative">
        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
          <i data-lucide="search" class="w-5 h-5 text-gray-400"></i>
        </div>
        <input
          type="text"
          placeholder="Cari jamaah, paket..."
          class="pl-10 pr-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500 w-64"
        >
      </div>

      <!-- Notifications -->
      <div class="relative">
        <button class="relative p-2 text-gray-600 hover:text-gray-900 hover:bg-gray-100 rounded-lg transition">
          <i data-lucide="bell" class="w-6 h-6"></i>
          <span class="absolute top-1 right-1 w-2 h-2 bg-red-500 rounded-full"></span>
        </button>
      </div>

      <!-- User Menu -->
      <div class="relative">
        <button onclick="toggleDropdown('userDropdown')" data-dropdown class="flex items-center gap-2 p-2 hover:bg-gray-100 rounded-lg transition">
          <img src="https://ui-avatars.com/api/?name=Ahmad+Fauzi&background=059669&color=fff" alt="User" class="w-8 h-8 rounded-full">
          <i data-lucide="chevron-down" class="w-4 h-4 text-gray-600"></i>
        </button>

        <!-- Dropdown Menu -->
        <div id="userDropdown" class="hidden absolute right-0 mt-2 w-48 bg-white rounded-lg shadow-lg border border-gray-200 py-1">
          <a href="../profile.html" class="flex items-center gap-2 px-4 py-2 text-sm text-gray-700 hover:bg-gray-100">
            <i data-lucide="user" class="w-4 h-4"></i>
            Profile
          </a>
          <a href="#" class="flex items-center gap-2 px-4 py-2 text-sm text-gray-700 hover:bg-gray-100">
            <i data-lucide="settings" class="w-4 h-4"></i>
            Pengaturan
          </a>
          <hr class="my-1">
          <a href="../index.html" class="flex items-center gap-2 px-4 py-2 text-sm text-red-600 hover:bg-red-50">
            <i data-lucide="log-out" class="w-4 h-4"></i>
            Keluar
          </a>
        </div>
      </div>
    </div>
  </div>
</header>
