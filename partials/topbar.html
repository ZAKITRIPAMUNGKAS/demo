<!-- Top Navigation Bar -->
<header class="bg-white/80 backdrop-blur-md border-b border-slate-200 sticky top-0 z-30">
  <div class="flex items-center justify-between px-8 py-4">
    <!-- Mobile Menu Button & Page Title -->
    <div class="flex items-center gap-6">
      <button onclick="toggleSidebar()" class="lg:hidden p-2 text-slate-500 hover:text-slate-900 hover:bg-slate-100 rounded-xl transition-all">
        <i data-lucide="menu" class="w-6 h-6"></i>
      </button>
      <div class="reveal">
        <h2 id="pageTitle" class="text-2xl font-extrabold text-slate-900 tracking-tight leading-tight">Dashboard</h2>
        <div class="flex items-center gap-2 mt-0.5">
          <span class="w-2 h-2 bg-blue-500 rounded-full animate-pulse"></span>
          <p id="pageSubtitle" class="text-xs font-bold text-slate-400 uppercase tracking-widest">Sistem Operasional Aktif</p>
        </div>
      </div>
    </div>

    <!-- Right Side Actions -->
    <div class="flex items-center gap-6">
      <!-- Search -->
      <div class="hidden md:block relative group">
        <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-slate-400 group-focus-within:text-blue-600 transition-colors">
          <i data-lucide="search" class="w-5 h-5"></i>
        </div>
        <input
          type="text"
          placeholder="Cari jamaah, paket, atau hotel..."
          class="pl-12 pr-6 py-2.5 bg-slate-100 border-none rounded-xl focus:ring-2 focus:ring-blue-500 focus:bg-white w-80 text-sm font-medium transition-all"
        >
      </div>

      <!-- Notifications -->
      <div class="relative">
        <button class="relative p-3 text-slate-500 hover:text-blue-600 hover:bg-blue-50 rounded-xl transition-all duration-200">
          <i data-lucide="bell" class="w-6 h-6"></i>
          <span class="absolute top-2 right-2 w-3 h-3 bg-red-500 border-2 border-white rounded-full"></span>
        </button>
      </div>

      <!-- User Menu -->
      <div class="relative">
        <button onclick="toggleDropdown('userDropdown')" data-dropdown class="flex items-center gap-3 p-1.5 pr-4 hover:bg-slate-100 rounded-2xl transition-all duration-200 border border-transparent hover:border-slate-200 group">
          <img src="https://ui-avatars.com/api/?name=Ahmad+Fauzi&background=059669&color=fff" alt="User" class="w-9 h-9 rounded-xl shadow-md group-hover:scale-105 transition-transform">
          <div class="hidden sm:block text-left">
            <p class="text-xs font-bold text-slate-900 leading-none">Ahmad Fauzi</p>
            <p class="text-[10px] font-bold text-slate-400 uppercase tracking-tighter mt-1">Administrator</p>
          </div>
          <i data-lucide="chevron-down" class="w-4 h-4 text-slate-400 group-hover:text-slate-900 transition-colors"></i>
        </button>

        <!-- Dropdown Menu -->
        <div id="userDropdown" class="hidden absolute right-0 mt-3 w-56 bg-white rounded-2xl shadow-2xl border border-slate-100 py-2 reveal overflow-hidden">
          <div class="px-4 py-3 border-b border-slate-50 bg-slate-50/50">
            <p class="text-xs font-bold text-slate-400 uppercase tracking-widest mb-1">Status Sesi</p>
            <div class="flex items-center gap-2">
              <span class="w-2 h-2 bg-blue-500 rounded-full"></span>
              <p class="text-sm font-bold text-slate-700">Online & Terverifikasi</p>
            </div>
          </div>
          <div class="p-2 space-y-1">
            <a href="../profile.html" class="flex items-center gap-3 px-3 py-2.5 text-sm font-semibold text-slate-600 hover:bg-slate-50 hover:text-blue-600 rounded-xl transition-all">
              <i data-lucide="user" class="w-4 h-4"></i>
              Profil Pengguna
            </a>
            <a href="#" class="flex items-center gap-3 px-3 py-2.5 text-sm font-semibold text-slate-600 hover:bg-slate-50 hover:text-blue-600 rounded-xl transition-all">
              <i data-lucide="settings" class="w-4 h-4"></i>
              Pengaturan Akun
            </a>
            <hr class="my-2 border-slate-100 mx-2">
            <a href="../index.html" class="flex items-center gap-3 px-3 py-2.5 text-sm font-bold text-red-500 hover:bg-red-50 rounded-xl transition-all">
              <i data-lucide="log-out" class="w-4 h-4"></i>
              Keluar Sistem
            </a>
          </div>
        </div>
      </div>
    </div>
  </div>
</header>
