<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Sistem Manajemen Haji & Umroh</title>

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>

  <!-- Custom CSS -->
  <link rel="stylesheet" href="assets/css/custom.css">
</head>
<body class="min-h-screen flex items-center justify-center islamic-pattern bg-gradient-to-br from-emerald-50 via-white to-amber-50">

  <div class="w-full max-w-md px-6">
    <!-- Logo & Title -->
    <div class="text-center mb-8 fade-in">
      <div class="inline-flex items-center justify-center w-20 h-20 bg-gradient-to-br from-emerald-600 to-emerald-700 rounded-2xl shadow-lg mb-4">
        <i data-lucide="plane" class="w-10 h-10 text-white"></i>
      </div>
      <h1 class="text-3xl font-bold text-gray-900 mb-2">Sistem Manajemen</h1>
      <p class="text-lg text-emerald-700 font-semibold">Haji & Umroh</p>
      <p class="text-sm text-gray-600 mt-2">Kelola jamaah, keberangkatan, dan hotel dengan mudah</p>
    </div>

    <!-- Login Card -->
    <div class="bg-white rounded-2xl shadow-xl p-8 fade-in" style="animation-delay: 0.1s;">
      <h2 class="text-2xl font-bold text-gray-900 mb-6">Masuk ke Akun Anda</h2>

      <form id="loginForm" class="space-y-5">
        <!-- Email -->
        <div>
          <label for="email" class="block text-sm font-medium text-gray-700 mb-2">
            Email
          </label>
          <div class="relative">
            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
              <i data-lucide="mail" class="w-5 h-5 text-gray-400"></i>
            </div>
            <input
              type="email"
              id="email"
              name="email"
              value="ahmad.fauzi@hajjumroh.com"
              class="block w-full pl-10 pr-3 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500 transition"
              placeholder="nama@email.com"
              required
            >
          </div>
        </div>

        <!-- Password -->
        <div>
          <label for="password" class="block text-sm font-medium text-gray-700 mb-2">
            Password
          </label>
          <div class="relative">
            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
              <i data-lucide="lock" class="w-5 h-5 text-gray-400"></i>
            </div>
            <input
              type="password"
              id="password"
              name="password"
              value="password123"
              class="block w-full pl-10 pr-10 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500 transition"
              placeholder="••••••••"
              required
            >
            <button
              type="button"
              onclick="togglePassword()"
              class="absolute inset-y-0 right-0 pr-3 flex items-center"
            >
              <i data-lucide="eye" id="eyeIcon" class="w-5 h-5 text-gray-400 hover:text-gray-600"></i>
            </button>
          </div>
        </div>

        <!-- Remember Me & Forgot Password -->
        <div class="flex items-center justify-between">
          <div class="flex items-center">
            <input
              id="remember"
              name="remember"
              type="checkbox"
              class="h-4 w-4 text-emerald-600 focus:ring-emerald-500 border-gray-300 rounded"
            >
            <label for="remember" class="ml-2 block text-sm text-gray-700">
              Ingat saya
            </label>
          </div>
          <a href="#" class="text-sm font-medium text-emerald-600 hover:text-emerald-700">
            Lupa password?
          </a>
        </div>

        <!-- Submit Button -->
        <button
          type="submit"
          class="w-full flex items-center justify-center gap-2 bg-gradient-to-r from-emerald-600 to-emerald-700 text-white py-3 px-4 rounded-lg font-semibold hover:from-emerald-700 hover:to-emerald-800 focus:outline-none focus:ring-2 focus:ring-emerald-500 focus:ring-offset-2 transition shadow-lg hover:shadow-xl"
        >
          <i data-lucide="log-in" class="w-5 h-5"></i>
          Masuk
        </button>
      </form>

      <!-- Demo Credentials -->
      <div class="mt-6 p-4 bg-amber-50 border border-amber-200 rounded-lg">
        <p class="text-xs font-semibold text-amber-800 mb-2 flex items-center gap-2">
          <i data-lucide="info" class="w-4 h-4"></i>
          Demo Credentials
        </p>
        <p class="text-xs text-amber-700">
          Email: <span class="font-mono font-semibold">ahmad.fauzi@hajjumroh.com</span><br>
          Password: <span class="font-mono font-semibold">password123</span>
        </p>
      </div>
    </div>

    <!-- Footer -->
    <p class="text-center text-sm text-gray-600 mt-6">
      © 2026 Sistem Manajemen Haji & Umroh. All rights reserved.
    </p>
  </div>

  <script>
    // Initialize Lucide icons
    lucide.createIcons();

    // Toggle password visibility
    function togglePassword() {
      const passwordInput = document.getElementById('password');
      const eyeIcon = document.getElementById('eyeIcon');

      if (passwordInput.type === 'password') {
        passwordInput.type = 'text';
        eyeIcon.setAttribute('data-lucide', 'eye-off');
      } else {
        passwordInput.type = 'password';
        eyeIcon.setAttribute('data-lucide', 'eye');
      }
      lucide.createIcons();
    }

    // Handle login
    document.getElementById('loginForm').addEventListener('submit', function(e) {
      e.preventDefault();

      // Show loading state
      const submitBtn = this.querySelector('button[type="submit"]');
      const originalText = submitBtn.innerHTML;
      submitBtn.innerHTML = '<div class="spinner mx-auto" style="width: 24px; height: 24px; border-width: 2px;"></div>';
      submitBtn.disabled = true;

      // Simulate login delay
      setTimeout(() => {
        // Redirect to dashboard
        window.location.href = 'dashboard.html';
      }, 1000);
    });
  </script>
</body>
</html>
