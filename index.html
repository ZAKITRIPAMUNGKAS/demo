<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | Sistem Manajemen Haji & Umroh</title>

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap"
    rel="stylesheet">

  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>

  <!-- Custom CSS -->
  <link rel="stylesheet" href="assets/css/custom.css">

  <style>
    .bg-overlay {
      background: linear-gradient(135deg, rgba(15, 23, 42, 0.9) 0%, rgba(30, 58, 138, 0.8) 100%) !important;
    }

    .full-bg {
      background-image: url('assets/img/bg.png') !important;
      background-size: cover !important;
      background-position: center !important;
    }

    /* Glass Effect Card */
    .glass-card {
      background: rgba(255, 255, 255, 0.85) !important;
      backdrop-filter: blur(20px) !important;
      -webkit-backdrop-filter: blur(20px) !important;
      border: 1px solid rgba(255, 255, 255, 0.3) !important;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5) !important;
    }

    /* Premium Button */
    .btn-premium {
      background: linear-gradient(135deg, #2563eb 0%, #1d4ed8 100%) !important;
      color: white !important;
      border: none !important;
      box-shadow: 0 10px 20px -5px rgba(37, 99, 235, 0.4) !important;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1) !important;
    }

    .btn-premium:hover {
      transform: translateY(-2px) !important;
      box-shadow: 0 15px 25px -5px rgba(37, 99, 235, 0.5) !important;
      filter: brightness(1.1) !important;
    }

    /* Input Styles */
    .form-input {
      background: rgba(248, 250, 252, 0.8) !important;
      border: 1.5px solid #e2e8f0 !important;
      border-radius: 1rem !important;
      transition: all 0.3s !important;
      color: #0f172a !important;
    }

    .form-input:focus {
      background: white !important;
      border-color: #2563eb !important;
      box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.1) !important;
      outline: none !important;
    }

    /* Custom Animations */
    @keyframes spin {
      0% {
        transform: rotate(0deg);
      }

      100% {
        transform: rotate(360deg);
      }
    }

    .spinner-pro {
      border: 2px solid rgba(255, 255, 255, 0.3) !important;
      border-top: 2px solid white !important;
      border-radius: 50% !important;
      width: 20px !important;
      height: 20px !important;
      animation: spin 0.8s linear infinite !important;
      display: inline-block !important;
    }
  </style>
</head>

<body class="min-h-screen flex items-center justify-center full-bg relative py-8 md:py-12">

  <!-- Overlay -->
  <div class="absolute inset-0 bg-overlay z-0"></div>
  <div class="absolute inset-0 islamic-mesh opacity-20 z-10"></div>

  <div class="w-full max-w-lg px-6 relative z-20 reveal">
    <!-- Logo & Title -->
    <div class="text-center mb-10">
      <div
        class="inline-flex items-center justify-center w-32 h-32 bg-white/10 backdrop-blur-md rounded-[2.5rem] border border-white/20 shadow-2xl mb-6 mx-auto transition-transform hover:scale-110 duration-500 overflow-hidden p-1 group">
        <img src="assets/img/logo.png" alt="Logo"
          class="w-full h-full object-contain scale-110 group-hover:scale-125 transition-transform duration-500">
      </div>
      <h1 class="text-4xl font-extrabold text-white tracking-tight mb-2">Sistem Manajemen</h1>
      <div class="flex items-center justify-center gap-3">
        <span class="h-px w-8 bg-blue-500/50"></span>
        <p class="text-xl text-blue-400 font-medium uppercase tracking-widest">Haji & Umroh</p>
        <span class="h-px w-8 bg-blue-500/50"></span>
      </div>
    </div>

    <!-- Login Card -->
    <div class="glass-card rounded-[2rem] p-10 border border-white/20">
      <div class="mb-8">
        <h2 class="text-3xl font-bold text-slate-900 mb-2">Selamat Datang</h2>
        <p class="text-slate-500">Silakan masuk untuk mengelola operasional Anda.</p>
      </div>

      <form id="loginForm" class="space-y-6">
        <!-- Email -->
        <div class="space-y-2">
          <label for="email" class="text-sm font-semibold text-slate-700 ml-1">Email Address</label>
          <div class="relative group">
            <div
              class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none transition-colors group-focus-within:text-blue-600 text-slate-400">
              <i data-lucide="mail" class="w-5 h-5"></i>
            </div>
            <input type="email" id="email" name="email" value="ahmad.fauzi@hajjumroh.com"
              class="form-input block w-full pl-12 pr-4 py-4 text-slate-900 placeholder:text-slate-400"
              placeholder="nama@email.com" required>
          </div>
        </div>

        <!-- Password -->
        <div class="space-y-2">
          <div class="flex items-center justify-between ml-1">
            <label for="password" class="text-sm font-semibold text-slate-700">Password</label>
            <a href="#"
              class="text-xs font-bold text-blue-600 hover:text-blue-700 transition-colors uppercase tracking-wider">Lupa
              Password?</a>
          </div>
          <div class="relative group">
            <div
              class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none transition-colors group-focus-within:text-blue-600 text-slate-400">
              <i data-lucide="lock" class="w-5 h-5"></i>
            </div>
            <input type="password" id="password" name="password" value="password123"
              class="form-input block w-full pl-12 pr-12 py-4 text-slate-900 placeholder:text-slate-400"
              placeholder="••••••••" required>
            <button type="button" onclick="togglePassword()"
              class="absolute inset-y-0 right-0 pr-4 flex items-center text-slate-400 hover:text-blue-600 transition-colors">
              <i data-lucide="eye" id="eyeIcon" class="w-5 h-5"></i>
            </button>
          </div>
        </div>

        <!-- Remember Me -->
        <div class="flex items-center ml-1">
          <input id="remember" name="remember" type="checkbox"
            class="h-5 w-5 text-blue-600 focus:ring-blue-500 border-slate-300 rounded-md transition-all cursor-pointer">
          <label for="remember" class="ml-3 block text-sm font-medium text-slate-600 cursor-pointer">
            Biarkan saya tetap masuk
          </label>
        </div>

        <!-- Submit Button -->
        <button type="submit"
          class="w-full btn-premium py-4 px-6 rounded-xl text-lg font-bold shadow-2xl transition-all active:scale-[0.98]">
          <div class="flex items-center justify-center gap-3" id="btnContent">
            <span>Masuk ke Sistem</span>
            <i data-lucide="arrow-right" class="w-5 h-5"></i>
          </div>
        </button>
      </form>

      <!-- Demo Info -->
      <div class="mt-8 pt-8 border-t border-slate-100">
        <div class="bg-blue-50/50 rounded-2xl p-4 border border-blue-100">
          <div class="flex items-start gap-3">
            <div class="p-2 bg-blue-100 rounded-lg text-blue-600">
              <i data-lucide="shield-check" class="w-4 h-4"></i>
            </div>
            <div>
              <p class="text-[10px] uppercase tracking-[0.2em] font-bold text-blue-700 mb-1">Akses Demo Terdeteksi</p>
              <p class="text-xs text-blue-800/70 font-medium">Klik tombol di atas untuk langsung melihat dashboard.</p>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Footer -->
    <div class="text-center mt-10">
      <p class="text-white/40 text-xs font-medium uppercase tracking-[0.3em]">
        © 2026 GEMALA.DEV - Sistem ON DEMO
      </p>
    </div>
  </div>

  <script>
    // Initialize Lucide icons
    lucide.createIcons();

    // Toggle password visibility
    function togglePassword() {
      const passwordInput = document.getElementById('password');
      const eyeIcon = document.getElementById('eyeIcon');

      if (passwordInput.type === 'password') {
        passwordInput.type = 'text';
        eyeIcon.setAttribute('data-lucide', 'eye-off');
      } else {
        passwordInput.type = 'password';
        eyeIcon.setAttribute('data-lucide', 'eye');
      }
      lucide.createIcons();
    }

    // Handle login
    document.getElementById('loginForm').addEventListener('submit', function (e) {
      e.preventDefault();

      const btnContent = document.getElementById('btnContent');
      const originalContent = btnContent.innerHTML;

      // Loading State
      btnContent.innerHTML = '<div class="spinner-pro"></div><span class="text-sm font-medium tracking-widest uppercase">Memverifikasi...</span>';
      this.querySelector('button').disabled = true;

      // Simulation
      setTimeout(() => {
        window.location.href = 'dashboard.html';
      }, 1200);
    });
  </script>
</body>

</html>
