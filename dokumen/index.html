<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dokumen Jamaah - Sistem Manajemen Haji & Umroh</title>

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>

  <!-- Custom CSS -->
  <link rel="stylesheet" href="../assets/css/custom.css">
</head>
<body class="bg-gray-50">

  <!-- Sidebar -->
  <div id="sidebar-container"></div>

  <!-- Main Content -->
  <div class="lg:ml-64">
    <!-- Topbar -->
    <div id="topbar-container"></div>

    <!-- Page Content -->
    <main class="p-6">
      <!-- Page Header -->
      <div class="flex flex-col md:flex-row md:items-center md:justify-between mb-6">
        <div>
          <h1 class="text-2xl font-bold text-gray-900 mb-2">Dokumen Jamaah</h1>
          <p class="text-sm text-gray-600">Kelola dan verifikasi dokumen jamaah</p>
        </div>
      </div>

      <!-- Stats Cards -->
      <div class="grid grid-cols-1 md:grid-cols-4 gap-6 mb-6">
        <div class="bg-white rounded-xl shadow-sm p-6 border border-gray-100">
          <div class="flex items-center justify-between mb-4">
            <div class="flex items-center justify-center w-12 h-12 bg-green-100 rounded-lg">
              <i data-lucide="check-circle" class="w-6 h-6 text-green-600"></i>
            </div>
          </div>
          <h3 class="text-2xl font-bold text-gray-900 mb-1">156</h3>
          <p class="text-sm text-gray-600">Dokumen Verified</p>
        </div>

        <div class="bg-white rounded-xl shadow-sm p-6 border border-gray-100">
          <div class="flex items-center justify-between mb-4">
            <div class="flex items-center justify-center w-12 h-12 bg-amber-100 rounded-lg">
              <i data-lucide="clock" class="w-6 h-6 text-amber-600"></i>
            </div>
          </div>
          <h3 class="text-2xl font-bold text-gray-900 mb-1">23</h3>
          <p class="text-sm text-gray-600">Menunggu Verifikasi</p>
        </div>

        <div class="bg-white rounded-xl shadow-sm p-6 border border-gray-100">
          <div class="flex items-center justify-between mb-4">
            <div class="flex items-center justify-center w-12 h-12 bg-red-100 rounded-lg">
              <i data-lucide="x-circle" class="w-6 h-6 text-red-600"></i>
            </div>
          </div>
          <h3 class="text-2xl font-bold text-gray-900 mb-1">8</h3>
          <p class="text-sm text-gray-600">Ditolak</p>
        </div>

        <div class="bg-white rounded-xl shadow-sm p-6 border border-gray-100">
          <div class="flex items-center justify-between mb-4">
            <div class="flex items-center justify-center w-12 h-12 bg-blue-100 rounded-lg">
              <i data-lucide="file-text" class="w-6 h-6 text-blue-600"></i>
            </div>
          </div>
          <h3 class="text-2xl font-bold text-gray-900 mb-1">187</h3>
          <p class="text-sm text-gray-600">Total Dokumen</p>
        </div>
      </div>

      <!-- Filters -->
      <div class="bg-white rounded-xl shadow-sm p-6 mb-6 border border-gray-100">
        <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-2">Cari Jamaah</label>
            <div class="relative">
              <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                <i data-lucide="search" class="w-5 h-5 text-gray-400"></i>
              </div>
              <input
                type="text"
                id="searchInput"
                placeholder="Cari nama jamaah..."
                class="block w-full pl-10 pr-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500"
              >
            </div>
          </div>

          <div>
            <label class="block text-sm font-medium text-gray-700 mb-2">Status Dokumen</label>
            <select class="block w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500">
              <option value="">Semua Status</option>
              <option value="verified">Verified</option>
              <option value="pending">Pending</option>
              <option value="rejected">Ditolak</option>
            </select>
          </div>

          <div>
            <label class="block text-sm font-medium text-gray-700 mb-2">Jenis Dokumen</label>
            <select class="block w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500">
              <option value="">Semua Jenis</option>
              <option value="ktp">KTP</option>
              <option value="kk">Kartu Keluarga</option>
              <option value="paspor">Paspor</option>
              <option value="visa">Visa</option>
              <option value="vaksin">Vaksin Meningitis</option>
            </select>
          </div>
        </div>
      </div>

      <!-- Dokumen List -->
      <div class="space-y-4" id="dokumenList">
        <!-- Cards will be populated by JavaScript -->
      </div>
    </main>
  </div>

  <!-- Upload Dokumen Modal -->
  <div id="uploadDokumenModal" class="modal-backdrop hidden fixed inset-0 z-50 items-center justify-center p-4">
    <div class="bg-white rounded-xl shadow-2xl max-w-2xl w-full p-6">
      <div class="flex items-center justify-between mb-6">
        <h3 class="text-xl font-bold text-gray-900">Upload Dokumen</h3>
        <button onclick="closeModal('uploadDokumenModal')" class="text-gray-400 hover:text-gray-600">
          <i data-lucide="x" class="w-6 h-6"></i>
        </button>
      </div>

      <form data-submit-message="Dokumen berhasil diupload!">
        <div class="space-y-4">
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-2">Jenis Dokumen</label>
            <select class="block w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-emerald-500" required>
              <option value="">Pilih jenis dokumen</option>
              <option value="ktp">KTP</option>
              <option value="kk">Kartu Keluarga</option>
              <option value="paspor">Paspor</option>
              <option value="foto">Foto 4x6</option>
              <option value="vaksin">Vaksin Meningitis</option>
              <option value="visa">Visa</option>
            </select>
          </div>

          <div>
            <label class="block text-sm font-medium text-gray-700 mb-2">Upload File</label>
            <div class="file-upload-area border-2 border-dashed border-gray-300 rounded-lg p-8 text-center">
              <i data-lucide="upload-cloud" class="w-12 h-12 text-gray-400 mx-auto mb-3"></i>
              <p class="text-sm text-gray-600 mb-2">Drag & drop file atau klik untuk browse</p>
              <p class="text-xs text-gray-500">Format: JPG, PNG, PDF (Max 5MB)</p>
              <input type="file" accept="image/*,.pdf" class="hidden" id="dokumenFile">
              <button type="button" onclick="document.getElementById('dokumenFile').click()" class="mt-4 px-4 py-2 bg-emerald-600 text-white rounded-lg hover:bg-emerald-700 transition text-sm">
                Pilih File
              </button>
            </div>
          </div>

          <div>
            <label class="block text-sm font-medium text-gray-700 mb-2">Catatan</label>
            <textarea rows="3" class="block w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-emerald-500" placeholder="Catatan tambahan (opsional)"></textarea>
          </div>
        </div>

        <div class="flex gap-3 mt-6">
          <button type="button" onclick="closeModal('uploadDokumenModal')" class="flex-1 px-4 py-2 border border-gray-300 text-gray-700 rounded-lg hover:bg-gray-50 transition">
            Batal
          </button>
          <button type="submit" class="flex-1 px-4 py-2 bg-emerald-600 text-white rounded-lg hover:bg-emerald-700 transition">
            Upload
          </button>
        </div>
      </form>
    </div>
  </div>

  <!-- Scripts -->
  <script src="../assets/js/data.js"></script>
  <script src="../assets/js/main.js"></script>
  <script>
    // Initialize Lucide icons
    lucide.createIcons();

    // Populate dokumen list
    function populateDokumenList() {
      const list = document.getElementById('dokumenList');
      list.innerHTML = dummyData.dokumen.map(item => `
        <div class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
          <div class="p-6 border-b border-gray-200">
            <div class="flex items-center justify-between">
              <div class="flex items-center gap-4">
                <img src="https://ui-avatars.com/api/?name=${encodeURIComponent(item.jamaahNama)}&background=059669&color=fff" alt="${item.jamaahNama}" class="w-12 h-12 rounded-full">
                <div>
                  <h3 class="text-lg font-bold text-gray-900">${item.jamaahNama}</h3>
                  <p class="text-sm text-gray-600">${item.dokumen.length} dokumen</p>
                </div>
              </div>
              <button onclick="openModal('uploadDokumenModal')" class="flex items-center gap-2 px-4 py-2 bg-emerald-600 text-white rounded-lg hover:bg-emerald-700 transition text-sm">
                <i data-lucide="upload" class="w-4 h-4"></i>
                Upload
              </button>
            </div>
          </div>

          <div class="p-6">
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
              ${item.dokumen.map(dok => `
                <div class="flex items-center justify-between p-4 border border-gray-200 rounded-lg hover:bg-gray-50 transition">
                  <div class="flex items-center gap-3">
                    <div class="flex items-center justify-center w-10 h-10 ${
                      dok.status === 'Verified' ? 'bg-green-100' :
                      dok.status === 'Pending' ? 'bg-amber-100' :
                      'bg-red-100'
                    } rounded-lg">
                      <i data-lucide="${
                        dok.jenis === 'Foto 4x6' ? 'image' : 'file-text'
                      }" class="w-5 h-5 ${
                        dok.status === 'Verified' ? 'text-green-600' :
                        dok.status === 'Pending' ? 'text-amber-600' :
                        'text-red-600'
                      }"></i>
                    </div>
                    <div>
                      <p class="font-semibold text-gray-900 text-sm">${dok.jenis}</p>
                      <p class="text-xs text-gray-600">${dok.uploadDate ? formatDate(dok.uploadDate) : 'Belum upload'}</p>
                    </div>
                  </div>
                  <span class="badge ${
                    dok.status === 'Verified' ? 'badge-success' :
                    dok.status === 'Pending' ? 'badge-warning' :
                    'badge-danger'
                  }">${dok.status}</span>
                </div>
              `).join('')}
            </div>
          </div>
        </div>
      `).join('');
      lucide.createIcons();
    }

    // Initialize
    populateDokumenList();
  </script>
</body>
</html>
