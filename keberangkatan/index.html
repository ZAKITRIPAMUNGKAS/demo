<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jadwal Keberangkatan | Sistem Manajemen Haji & Umroh</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest"></script>
  <link rel="stylesheet" href="../assets/css/custom.css">
</head>
<body class="bg-premium min-h-screen">

  <!-- Sidebar -->
  <div id="sidebar-container"></div>

  <!-- Main Content -->
  <div class="lg:ml-72 min-h-screen flex flex-col">
    <!-- Topbar -->
    <div id="topbar-container"></div>

    <!-- Page Content -->
    <main class="p-8 flex-1 reveal">
      <!-- Page Header -->
      <div class="flex flex-col md:flex-row md:items-center md:justify-between mb-8 gap-4">
        <div>
          <h1 class="text-3xl font-bold text-slate-900 tracking-tight mb-1">Jadwal Keberangkatan</h1>
          <p class="text-slate-500 font-medium">Kelola grup keberangkatan jamaah haji dan umroh.</p>
        </div>
        <button onclick="openModal('addKeberangkatanModal')" class="btn-pro flex items-center gap-2.5 shadow-sm">
          <i data-lucide="plus" class="w-4 h-4"></i>
          Tambah Keberangkatan
        </button>
      </div>

      <!-- Stats Cards -->
      <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8" id="statsRow">
        <!-- populated by JS -->
      </div>

      <!-- Keberangkatan Cards -->
      <div class="space-y-5" id="keberangkatanList">
        <!-- populated by JS -->
      </div>
    </main>
  </div>

  <!-- Add Keberangkatan Modal -->
  <div id="addKeberangkatanModal" class="modal-backdrop hidden fixed inset-0 z-50 items-center justify-center p-4 bg-slate-900/60 backdrop-blur-sm">
    <div class="bg-white rounded-3xl shadow-2xl max-w-xl w-full p-8">
      <div class="flex items-center justify-between mb-6">
        <h3 class="text-xl font-bold text-slate-900 tracking-tight">Tambah Keberangkatan Baru</h3>
        <button onclick="closeModal('addKeberangkatanModal')" class="p-2 text-slate-400 hover:text-slate-600 hover:bg-slate-100 rounded-xl transition-colors">
          <i data-lucide="x" class="w-5 h-5"></i>
        </button>
      </div>
      <form data-submit-message="Keberangkatan berhasil ditambahkan!" class="space-y-5">
        <div>
          <label class="block text-sm font-bold text-slate-700 mb-2">Paket Perjalanan</label>
          <select class="block w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-4 focus:ring-blue-500/10 focus:border-blue-500 outline-none text-sm font-medium" required>
            <option value="">Pilih paket...</option>
            <option>Umroh Reguler 12 Hari</option>
            <option>Umroh Ramadhan 15 Hari</option>
            <option>Haji Plus 40 Hari</option>
          </select>
        </div>
        <div class="grid grid-cols-2 gap-4">
          <div>
            <label class="block text-sm font-bold text-slate-700 mb-2">Tanggal Berangkat</label>
            <input type="date" class="block w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-4 focus:ring-blue-500/10 focus:border-blue-500 outline-none text-sm" required>
          </div>
          <div>
            <label class="block text-sm font-bold text-slate-700 mb-2">Tanggal Kembali</label>
            <input type="date" class="block w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-4 focus:ring-blue-500/10 focus:border-blue-500 outline-none text-sm" required>
          </div>
        </div>
        <div>
          <label class="block text-sm font-bold text-slate-700 mb-2">Bandara Keberangkatan</label>
          <select class="block w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-4 focus:ring-blue-500/10 focus:border-blue-500 outline-none text-sm font-medium" required>
            <option value="">Pilih bandara...</option>
            <option>Soekarno-Hatta (CGK)</option>
            <option>Juanda (SUB)</option>
            <option>Kualanamu (KNO)</option>
          </select>
        </div>
        <div>
          <label class="block text-sm font-bold text-slate-700 mb-2">Maskapai</label>
          <select class="block w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-4 focus:ring-blue-500/10 focus:border-blue-500 outline-none text-sm font-medium" required>
            <option value="">Pilih maskapai...</option>
            <option>Garuda Indonesia</option>
            <option>Saudia</option>
            <option>Etihad Airways</option>
          </select>
        </div>
        <div>
          <label class="block text-sm font-bold text-slate-700 mb-2">Kuota Jamaah</label>
          <input type="number" class="block w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-4 focus:ring-blue-500/10 focus:border-blue-500 outline-none text-sm" placeholder="50" required>
        </div>
        <div class="flex gap-3 pt-2">
          <button type="button" onclick="closeModal('addKeberangkatanModal')" class="flex-1 px-4 py-3 border border-slate-200 text-slate-700 rounded-xl hover:bg-slate-50 transition font-semibold text-sm">
            Batal
          </button>
          <button type="submit" class="btn-pro flex-1 justify-center py-3 text-sm">
            Simpan Keberangkatan
          </button>
        </div>
      </form>
    </div>
  </div>

  <script src="../assets/js/data.js"></script>
  <script src="../assets/js/main.js"></script>
  <script>
    lucide.createIcons();

    function renderStats() {
      const data = dummyData.keberangkatan;
      const totalJamaah = data.reduce((s, k) => s + k.totalJamaah, 0);
      const open = data.filter(k => k.status === 'Open').length;
      const nearest = data.filter(k => k.status === 'Open').sort((a, b) => new Date(a.tanggalBerangkat) - new Date(b.tanggalBerangkat))[0];

      document.getElementById('statsRow').innerHTML = `
        <div class="pro-card p-7">
          <div class="flex items-center justify-between mb-4">
            <div class="p-3 bg-slate-900 rounded-xl shadow-sm">
              <i data-lucide="calendar-days" class="w-6 h-6 text-white"></i>
            </div>
            <span class="badge badge-success">${open} Aktif</span>
          </div>
          <h3 class="text-3xl font-bold text-slate-900 mb-1">${data.length}</h3>
          <p class="text-[10px] text-slate-400 tracking-micro">Total Keberangkatan</p>
        </div>
        <div class="pro-card p-7">
          <div class="flex items-center justify-between mb-4">
            <div class="p-3 bg-slate-900 rounded-xl shadow-sm">
              <i data-lucide="users" class="w-6 h-6 text-white"></i>
            </div>
          </div>
          <h3 class="text-3xl font-bold text-slate-900 mb-1">${totalJamaah}</h3>
          <p class="text-[10px] text-slate-400 tracking-micro">Total Jamaah Terdaftar</p>
        </div>
        <div class="pro-card p-7">
          <div class="flex items-center justify-between mb-4">
            <div class="p-3 bg-slate-900 rounded-xl shadow-sm">
              <i data-lucide="plane-takeoff" class="w-6 h-6 text-white"></i>
            </div>
            <span class="badge badge-warning">Terdekat</span>
          </div>
          <h3 class="text-xl font-bold text-slate-900 mb-1">${nearest ? formatDate(nearest.tanggalBerangkat) : '-'}</h3>
          <p class="text-[10px] text-slate-400 tracking-micro">Keberangkatan Berikutnya</p>
        </div>
      `;
      lucide.createIcons();
    }

    function renderKeberangkatan() {
      const container = document.getElementById('keberangkatanList');
      container.innerHTML = dummyData.keberangkatan.map(k => {
        const pct = (k.totalJamaah / k.kuotaMax) * 100;
        const isClosed = k.status === 'Closed';
        const isAlmostFull = pct >= 85;
        const statusColor = isClosed ? 'bg-slate-100 text-slate-500' : isAlmostFull ? 'bg-amber-100 text-amber-700 border border-amber-200' : 'bg-blue-100 text-blue-700 border border-blue-200';
        const barColor = isClosed ? 'bg-slate-400' : isAlmostFull ? 'bg-amber-500' : 'bg-blue-600';

        return `
          <div class="pro-card overflow-hidden ${isClosed ? 'opacity-70' : ''}">
            <div class="p-7">
              <div class="flex flex-col md:flex-row md:items-center md:justify-between gap-4 mb-6 border-b border-slate-100 pb-6">
                <div class="flex items-center gap-4">
                  <div class="p-3.5 ${isClosed ? 'bg-slate-100' : 'bg-slate-900 shadow-sm'} rounded-xl flex-shrink-0">
                    <i data-lucide="plane-takeoff" class="w-6 h-6 ${isClosed ? 'text-slate-400' : 'text-white'}"></i>
                  </div>
                  <div>
                    <div class="flex items-center gap-3 flex-wrap">
                      <h3 class="text-lg font-bold text-slate-900 tracking-tight">${k.kode}</h3>
                      <span class="px-2.5 py-1 text-[10px] font-bold rounded-xl tracking-micro uppercase ${statusColor}">${k.status}</span>
                    </div>
                    <p class="text-sm text-slate-500 mt-1 font-medium">${k.paket}</p>
                  </div>
                </div>
                <div class="flex gap-2">
                  <button class="flex items-center gap-2 px-4 py-2 bg-slate-50 border border-slate-200 text-slate-700 rounded-xl hover:bg-slate-100 transition-colors text-sm font-bold shadow-sm">
                    <i data-lucide="users" class="w-4 h-4"></i> Manifest
                  </button>
                  ${!isClosed ? `
                    <button class="flex items-center gap-2 px-4 py-2 bg-slate-900 text-white rounded-xl hover:bg-slate-800 transition-colors text-sm font-bold shadow-sm">
                      <i data-lucide="edit-3" class="w-4 h-4"></i> Edit
                    </button>
                  ` : ''}
                </div>
              </div>

              <!-- Info Grid -->
              <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-6">
                <div class="bg-slate-50/50 border border-slate-100 rounded-xl p-4">
                  <p class="text-[9px] text-slate-400 tracking-micro mb-1">Berangkat</p>
                  <p class="font-bold text-slate-900 text-sm tracking-tight-data">${formatDate(k.tanggalBerangkat)}</p>
                </div>
                <div class="bg-slate-50/50 border border-slate-100 rounded-xl p-4">
                  <p class="text-[9px] text-slate-400 tracking-micro mb-1">Kembali</p>
                  <p class="font-bold text-slate-900 text-sm tracking-tight-data">${formatDate(k.tanggalKembali)}</p>
                </div>
                <div class="bg-slate-50/50 border border-slate-100 rounded-xl p-4">
                  <p class="text-[9px] text-slate-400 tracking-micro mb-1">Maskapai</p>
                  <p class="font-bold text-slate-900 text-sm">${k.maskapai}</p>
                </div>
                <div class="bg-slate-50/50 border border-slate-100 rounded-xl p-4">
                  <p class="text-[9px] text-slate-400 tracking-micro mb-1">Bandara</p>
                  <p class="font-bold text-slate-900 text-sm">${k.bandara}</p>
                </div>
              </div>

              <!-- Capacity Bar -->
              <div class="px-2">
                <div class="flex items-center justify-between mb-2">
                  <p class="text-[10px] font-bold text-slate-500 uppercase tracking-wider">Kapasitas Jamaah</p>
                  <p class="text-sm font-bold text-slate-900 tracking-tight-data">${k.totalJamaah} <span class="text-slate-400 font-normal">/ ${k.kuotaMax} Kursi</span></p>
                </div>
                <div class="w-full h-2.5 bg-slate-100 rounded-full overflow-hidden">
                  <div class="h-full ${barColor} rounded-full transition-all duration-700" style="width: ${pct}%"></div>
                </div>
                <p class="text-[10px] font-bold text-slate-400 mt-1.5">${Math.round(pct)}% terisi · ${k.kuotaMax - k.totalJamaah} kursi tersisa</p>
              </div>
            </div>
          </div>
        `;
      }).join('');
      lucide.createIcons();
    }

    renderStats();
    renderKeberangkatan();
  </script>
</body>
</html>
